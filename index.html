  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

  <style>
    body {
      background: linear-gradient(180deg, #0a0a2e 0%, #000000 100%);
      font-family: 'Inter', system-ui, sans-serif;
      color: white;
      overflow-x: hidden;
    }
    .planet-card {
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      border-radius: 24px;
    }
    .planet-card:hover {
      transform: translateY(-15px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
    }
    .planet-img {
      transition: transform 0.9s ease;
    }
    .planet-card:hover .planet-img {
      transform: scale(1.18);
    }
    .glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 40%, rgba(103, 232, 249, 0.25), transparent 70%);
      opacity: 0;
      transition: opacity 0.5s;
    }
    .planet-card:hover .glow {
      opacity: 1;
    }
    .fact-bubble {
      animation: float 5.5s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    /* Модальне вікно */
    #modal {
      animation: modalPop 0.4s ease-out forwards;
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.9) translateY(30px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    /* Оптимізація під телефони */
    @media (max-width: 640px) {
      .planet-card {
        margin-bottom: 1.75rem;
      }
      h1 {
        font-size: 2.75rem;
      }
      .h-80 {
        height: 280px;
      }
      .fact-bubble {
        font-size: 0.875rem;
        padding: 10px 14px;
        max-width: 170px;
      }
    }
  </style>
</head>
<body class="min-h-screen pb-16">

  <!-- Навігація -->
  <nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-lg border-b border-white/10">
    <div class="max-w-5xl mx-auto px-4 py-5 flex items-center justify-between">
      <h1 class="text-2xl font-bold tracking-tighter">Космос</h1>
      
      <div class="flex gap-8 text-lg">
        <a href="index.html" class="nav-link active text-white">Планети</a>
        <a href="page2.html" class="nav-link text-white/70 hover:text-white transition">Чорні діри</a>
      </div>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-10">
    <div class="text-center mb-16">
      <h1 class="text-5xl sm:text-7xl font-bold tracking-tighter mb-4">
        Планети <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500">Сонячної системи</span>
      </h1>
      <p class="text-xl text-gray-400">Обери планету та дізнайся її таємниці</p>
    </div>

    <!-- Контейнер для карток планет -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="planets-container"></div>
  </div>

  <!-- МОДАЛЬНЕ ВІКНО -->
  <div id="modal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center z-[9999] p-4">
    <div onclick="event.stopImmediatePropagation()" 
         class="bg-zinc-900 rounded-3xl w-full max-w-xl max-h-[95vh] overflow-hidden shadow-2xl border border-white/10 relative">
      
      <div id="modal-content" class="overflow-y-auto max-h-[95vh]"></div>
      
      <!-- Кнопка закриття -->
      <button onclick="closeModal()" 
              class="absolute top-5 right-5 w-11 h-11 flex items-center justify-center text-3xl text-white/60 hover:text-white transition z-10">
        ✕
      </button>
    </div>
  </div>

  <footer class="text-center text-gray-500 text-sm mt-10 pb-8">
    Зроблено для любителів космосу • Оптимізовано для телефону
  </footer>

      {

      {

    function createPlanetCards() {
      const container = document.getElementById('planets-container');
      container.innerHTML = '';

      planets.forEach((planet, index) => {
        const card = document.createElement('div');
        card.className = `planet-card bg-zinc-900/70 backdrop-blur-xl border border-white/10 cursor-pointer`;

        card.innerHTML = `
          <div class="relative h-80 sm:h-96">
            <img src="${planet.image}" alt="${planet.name}" class="planet-img w-full h-full object-cover brightness-75">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/80 to-transparent"></div>
            <div class="glow"></div>
            
            <div class="absolute bottom-6 left-6 right-6">
              <div class="flex items-center gap-4">
                <div class="text-6xl drop-shadow-lg">${planet.emoji}</div>
                <div>
                  <h2 class="text-4xl sm:text-5xl font-bold tracking-tight">${planet.name}</h2>
                  <p class="text-lg text-gray-300">${planet.shortDesc}</p>
                </div>
              </div>
            </div>
            
            <div class="fact-bubble absolute top-6 right-6 bg-white/10 backdrop-blur-md px-5 py-3 rounded-2xl text-sm border border-white/20 max-w-[180px]">
              ${planet.factBubble}
            </div>
          </div>
          
          <div class="p-6 grid grid-cols-2 gap-4 text-sm">
            <div>
              <span class="text-gray-400 text-xs block">ВІДСТАНЬ</span>
              <span class="font-medium">${planet.distance}</span>
            </div>
            <div>
              <span class="text-gray-400 text-xs block">ТЕМПЕРАТУРА</span>
              <span class="font-medium">${planet.temp}</span>
            </div>
          </div>
        `;

        card.onclick = () => showModal(index);
        container.appendChild(card);
      });
    }

    function showModal(index) {
      const planet = planets[index];
      const modal = document.getElementById('modal');
      const content = document.getElementById('modal-content');

      content.innerHTML = `
        <div class="relative">
          <img src="${planet.image}" alt="${planet.name}" class="w-full h-80 sm:h-96 object-cover">
          <div class="absolute top-0 left-0 right-0 h-80 sm:h-96 bg-gradient-to-t from-zinc-900 via-zinc-900/70 to-transparent"></div>
          <div class="absolute bottom-0 left-0 right-0 p-8">
            <div class="flex items-center gap-5">
              <div class="text-7xl drop-shadow-2xl">${planet.emoji}</div>
              <div>
                <h2 class="text-5xl font-bold">${planet.name}</h2>
                <p class="text-xl text-gray-300">${planet.shortDesc}</p>
              </div>
            </div>
          </div>
        </div>
        
        <div class="p-8 space-y-8">
          <div class="grid grid-cols-2 sm:grid-cols-3 gap-6 text-center">
            <div class="bg-zinc-800/50 rounded-2xl p-4">
              <p class="text-xs text-gray-400">ВІДСТАНЬ ВІД СОНЦЯ</p>
              <p class="text-xl font-semibold mt-1">${planet.distance}</p>
            </div>
            <div class="bg-zinc-800/50 rounded-2xl p-4">
              <p class="text-xs text-gray-400">ПЕРІОД ОБІГУ</p>
              <p class="text-xl font-semibold mt-1">${planet.orbitalPeriod}</p>
            </div>
            <div class="bg-zinc-800/50 rounded-2xl p-4">
              <p class="text-xs text-gray-400">ДІАМЕТР</p>
              <p class="text-xl font-semibold mt-1">${planet.diameter}</p>
            </div>
          </div>
          
          <div>
            <h3 class="text-lg font-semibold mb-3 text-cyan-300">Про планету</h3>
            <p class="text-gray-300 leading-relaxed">${planet.fullDesc}</p>
          </div>
          
          <div class="bg-gradient-to-r from-cyan-900/30 to-blue-900/30 border border-cyan-500/30 rounded-3xl p-6">
            <h3 class="text-lg font-semibold mb-2">Цікавий факт</h3>
            <p class="text-amber-200 italic">"${planet.extraFact}"</p>
          </div>
        </div>
      `;

      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // Ініціалізація
    window.onload = () => {
      createPlanetCards();
    };
  </script>
</body>
</html>
